name: Build Android Joiner

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-joiner-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API: '23'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  ANDROID_NDK_VERSION: '27.2.12479018'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: relay/go.sum

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        shell: bash
        run: |
          sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Set build metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.5.0-alpha.9+${short_sha}"
          fi
          echo "BUILD_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "BUILD_COMMIT=${GITHUB_SHA}" >> "${GITHUB_ENV}"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_ENV}"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Prepare persistent Android signing
        shell: bash
        env:
          WLB_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          WLB_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          WLB_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          WLB_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          WLB_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          if [[ -z "${WLB_KEYSTORE_BASE64}" || -z "${WLB_STORE_PASSWORD}" || -z "${WLB_KEY_ALIAS}" || -z "${WLB_KEY_PASSWORD}" || -z "${WLB_CERT_SHA256}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "::error title=Android release signing::Tagged builds require the persistent Android signing secrets"
              exit 1
            fi
            echo "ANDROID_APK_VARIANT=debug" >> "${GITHUB_ENV}"
            echo "No release signing secret on branch build; producing a non-upgradeable debug artifact."
            exit 0
          fi
          signing_file="${RUNNER_TEMP}/whitelist-bypass-release.p12"
          printf '%s' "${WLB_KEYSTORE_BASE64}" | base64 --decode > "${signing_file}"
          chmod 600 "${signing_file}"
          echo "ANDROID_SIGNING_STORE_FILE=${signing_file}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_STORE_PASSWORD=${WLB_STORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_ALIAS=${WLB_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_PASSWORD=${WLB_KEY_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_STORE_TYPE=PKCS12" >> "${GITHUB_ENV}"
          echo "ANDROID_EXPECTED_CERT_SHA256=${WLB_CERT_SHA256}" >> "${GITHUB_ENV}"
          echo "ANDROID_APK_VARIANT=release" >> "${GITHUB_ENV}"

      - name: Test shared relay protocol
        working-directory: relay
        run: go test ./tunnel ./androidbind

      - name: Build Android native components from source
        working-directory: relay
        shell: bash
        run: |
          set -euo pipefail
          native_log="${RUNNER_TEMP}/android-native-build.log"
          exec 3>&1 4>&2
          exec > >(tee "${native_log}") 2>&1
          report_native_failure() {
            status=$?
            if [[ ${status} -ne 0 ]]; then
              message="$(tail -n 30 "${native_log}")"
              message="${message//'%'/'%25'}"
              message="${message//$'\r'/'%0D'}"
              message="${message//$'\n'/'%0A'}"
              echo "::error file=.github/workflows/android-joiner.yml,title=Android native build::${message}" >&3
            fi
            return ${status}
          }
          trap report_native_failure EXIT
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          toolchain="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # anet intentionally links net.zoneCache on Android. Go 1.26 rejects
          # that known dependency pattern unless the linkname check is disabled.
          # Remove this workaround when github.com/wlynxg/anet/issues/11 ships.
          ldflags="-s -w -checklinkname=0 -X whitelist-bypass/relay/common.Version=${BUILD_VERSION} -X whitelist-bypass/relay/common.BuildCommit=${BUILD_COMMIT} -X whitelist-bypass/relay/common.BuildTime=${BUILD_TIME}"

          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260508232728-bebd421c7fa8
          gomobile init

          mkdir -p ../android-app/app/libs
          gomobile bind -v \
            -target=android/arm,android/arm64 \
            -androidapi "${ANDROID_API}" \
            -o ../android-app/app/libs/mobile.aar \
            ./androidbind

          mkdir -p ../android-app/app/src/main/jniLibs/armeabi-v7a
          mkdir -p ../android-app/app/src/main/jniLibs/arm64-v8a

          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 \
            CC="${toolchain}/armv7a-linux-androideabi${ANDROID_API}-clang" \
            go build -trimpath -buildmode=pie -ldflags "${ldflags}" \
            -o ../android-app/app/src/main/jniLibs/armeabi-v7a/librelay.so .

          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            CC="${toolchain}/aarch64-linux-android${ANDROID_API}-clang" \
            go build -trimpath -buildmode=pie -ldflags "${ldflags}" \
            -o ../android-app/app/src/main/jniLibs/arm64-v8a/librelay.so .

          file ../android-app/app/src/main/jniLibs/*/librelay.so

      - name: Build installable APK
        working-directory: android-app
        shell: bash
        run: |
          set +e
          set -o pipefail
          task="assembleDebug"
          if [[ "${ANDROID_APK_VARIANT}" == "release" ]]; then task="assembleRelease"; fi
          gradle --no-daemon clean "${task}" 2>&1 | tee "${RUNNER_TEMP}/android-gradle-build.log"
          status=${PIPESTATUS[0]}
          set -e
          if [[ ${status} -ne 0 ]]; then
            message="$(tail -n 40 "${RUNNER_TEMP}/android-gradle-build.log")"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error file=android-app/app/build.gradle.kts,title=Android Gradle build::${message}"
            exit ${status}
          fi

      - name: Verify and stage APK
        shell: bash
        run: |
          set -euo pipefail
          apk="android-app/app/build/outputs/apk/${ANDROID_APK_VARIANT}/app-${ANDROID_APK_VARIANT}.apk"
          test -f "${apk}"
          test -f android-app/app/libs/mobile.aar
          unzip -l "${apk}" | grep -q 'lib/arm64-v8a/librelay.so'
          unzip -l "${apk}" | grep -q 'lib/armeabi-v7a/librelay.so'
          cert_output="$("${ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" verify --verbose --print-certs "${apk}")"
          printf '%s\n' "${cert_output}"
          fingerprint="$(printf '%s\n' "${cert_output}" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | tr -d ':' | tr '[:lower:]' '[:upper:]')"
          expected="$(printf '%s' "${ANDROID_EXPECTED_CERT_SHA256:-}" | tr -d ':' | tr '[:lower:]' '[:upper:]')"
          if [[ "${ANDROID_APK_VARIANT}" == "release" && -n "${expected}" && "${fingerprint}" != "${expected}" ]]; then
            echo "::error title=Android signer mismatch::Release certificate fingerprint does not match ANDROID_SIGNING_CERT_SHA256"
            exit 1
          fi
          mkdir -p prebuilts
          output="prebuilts/whitelist-bypass-android-${BUILD_VERSION}.apk"
          cp "${apk}" "${output}"
          sha256sum "${output}" > "${output}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: whitelist-bypass-android-${{ env.BUILD_VERSION }}
          path: |
            prebuilts/*.apk
            prebuilts/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Whitelist Bypass ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: false
          files: |
            prebuilts/*.apk
            prebuilts/*.sha256
