<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>WhitelistBypass Joiner</title>
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="sigil" aria-hidden="true">
          <svg viewBox="0 0 100 120">
            <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M50 8 C45 30 45 50 50 62 C55 50 55 30 50 8 Z"/>
              <path d="M52 50 C66 38 82 46 77 61 C73 73 59 71 54 60"/>
              <path d="M48 50 C34 38 18 46 23 61 C27 73 41 71 46 60"/>
              <path d="M31 69 H69"/>
              <path d="M50 62 C45 79 39 91 28 98 M50 62 C55 79 61 91 72 98"/>
              <path d="M50 68 C49 84 49 98 50 108 C51 98 51 84 50 68 Z"/>
              <circle cx="50" cy="40" r="4.4"/>
            </g>
          </svg>
        </div>
        <div>
          <p class="eyebrow">WHITELIST BYPASS / JOINER</p>
          <h1>Carrier Reliquary</h1>
        </div>
      </div>
      <div class="header-side">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="theme-glyph" aria-hidden="true"></span>
          <span id="themeLabel">Sable</span>
        </button>
        <div class="status-wrap">
          <span>transport state</span>
          <div class="status" id="status" data-state="idle">idle</div>
        </div>
      </div>
    </header>
    <main>
      <section class="form panel">
        <div class="section-heading"><span>01</span><h2>Connection rite</h2></div>
		<label class="check mode-toggle">
		  <input id="phoneGateway" type="checkbox" />
		  Route this PC through the Android phone
		</label>
		<div id="phoneGatewayFields" class="phone-gateway" hidden>
		  <label>
			Paste configuration copied from Android
			<textarea id="phoneConfig" rows="5" placeholder="WhitelistBypass phone SOCKS5&#10;Host: 192.168.43.1&#10;Port: 1080&#10;User: ...&#10;Password: ..."></textarea>
		  </label>
		  <div class="row">
			<label>Phone IPv4<input id="phoneHost" type="text" placeholder="192.168.43.1" /></label>
			<label>SOCKS5 port<input id="phonePort" type="number" value="1080" min="1" max="65535" /></label>
		  </div>
		  <div class="row">
			<label>Username<input id="phoneUser" type="text" autocomplete="off" /></label>
			<label>Password<input id="phonePass" type="password" autocomplete="off" /></label>
		  </div>
		  <span class="hint warning">Use only your own phone on a trusted Wi-Fi network or hotspot. Android LAN sharing must remain enabled.</span>
		</div>
        <label>
          Join link
          <input id="link" type="text" placeholder="Paste call link" />
          <span class="hint" id="platformHint">Detected platform: -</span>
        </label>
        <label>
          Display name
          <input id="name" type="text" value="Joiner" />
        </label>
        <div class="row">
          <label>
            SOCKS5 port
            <input id="socksPort" type="number" value="1080" min="1" max="65535" />
          </label>
          <label>
            DNS
            <input id="dns" type="text" value="1.1.1.1,8.8.8.8" />
          </label>
        </div>
        <div class="row">
          <label>
            SOCKS5 user
            <input id="socksUser" type="text" />
          </label>
          <label>
            SOCKS5 password
            <input id="socksPass" type="password" />
          </label>
        </div>
        <div class="row">
          <label>
            Tunnel mode
            <select id="tunnelMode">
              <option value="video" selected>Video (VP8)</option>
              <option value="dc">DataChannel</option>
            </select>
          </label>
          <label>
            Resources
            <select id="resources">
              <option value="moderate">Moderate</option>
              <option value="default" selected>Default</option>
              <option value="unlimited">Unlimited</option>
            </select>
          </label>
        </div>
        <label>
          VK Video reliability
          <select id="videoReliability">
            <option value="auto" selected>Auto (negotiated KCP)</option>
            <option value="raw">Legacy raw (rollback)</option>
          </select>
        </label>
        <label>
          KCP profile
          <select id="kcpProfile">
            <option value="stable">Stable — high loss</option>
            <option value="balanced" selected>Balanced — recommended</option>
            <option value="fast">Fast — experimental, SOCKS-only</option>
          </select>
        </label>
        <div class="row">
          <label>
            VP8 FPS
            <input id="vp8Fps" type="number" value="24" min="1" max="60" />
          </label>
          <label>
            VP8 batch
            <input id="vp8Batch" type="number" value="30" min="1" max="200" />
          </label>
        </div>
        <label class="check">
          <input id="noTun" type="checkbox" />
          SOCKS5 only (no system-wide routing)
        </label>
        <label class="check">
          <input id="dualTrack" type="checkbox" />
          Dual-track
        </label>
        <div class="actions">
          <button id="start">Start</button>
          <button id="stop">Stop</button>
        </div>
      </section>
      <section class="log-wrap panel">
        <div class="section-heading"><span>02</span><h2>Live diagnostics</h2><button class="log-download-btn" id="downloadLogs" type="button" title="Download logs">Save</button></div>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="dist/renderer/index.js"></script>
  </body>
</html>
